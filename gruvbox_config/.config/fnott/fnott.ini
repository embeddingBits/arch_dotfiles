# -*- conf -*-

# For documentation on these options, see `man fnott.ini`

# Global values
# output=<undefined>#
# min-width=0
max-width=800
# max-height=0
# stacking-order=bottom-up
# anchor=top-right
# edge-margin-vertical=10
# edge-margin-horizontal=10
# notification-margin=10
# icon-theme=hicolor
# max-icon-size=32
# selection-helper=dmenu
# selection-helper-uses-null-separator=no
play-sound=aplay /home/ebits/.config/fnott/alert.wav

# Default values, may be overridden in 'urgency' specific sections
# layer=top
background=1d2021ff

border-color=d8a657ff
# border-radius=0
border-size=2

# padding-vertical=20
# padding-horizontal=20

# dpi-aware=no

title-font=JetBrainsMono NFP:style=bold:size=15
title-color=ebdbb2ff
# title-format=<i>%a%A</i>

summary-font=JetBrainsMono NFP:style=bold:size=12
summary-color=ebdbb2ff
# summary-format=<b>%s</b>\n

body-font=JetBrainsMono NFP:style=bold:size=12
body-color=ebdbb2ff
# body-format=%b

# progress-bar-height=20
# progress-color=ffffffff
# progress-style=bar

sound-file=~/.config/fnott/alert.wav
# icon=

# Timeout values are in seconds. 0 to disable
max-timeout=5
default-timeout=5
idle-timeout=0

# [low]
# background=2b2b2bff
# title-color=888888ff
# summary-color=888888ff
# body-color=888888ff

# [normal]

# [critical]
# background=6c3333ff
